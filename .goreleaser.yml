version: 2

before:
  hooks:
    - go test ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    # Already distinct from the macOS app DMG (workroom-macos-app_<version>.dmg) by suffix;
    # `install.sh` and `internal/updater/updater.go` download this exact name, so keep them in sync.
    name_template: "workroom_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  # A clean vX.Y.Z tag publishes as a normal ("Latest") release; a tag with a prerelease
  # component (e.g. v1.4.0-rc1, -beta, -alpha) is auto-marked as a GitHub pre-release so it
  # never becomes "Latest".
  prerelease: auto
