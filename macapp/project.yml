# XcodeGen spec for the Workroom macOS app.
#
# Generate the Xcode project from this file (the .xcodeproj is gitignored):
#     brew install xcodegen        # one-time
#     cd macapp && xcodegen generate && open WorkroomApp.xcodeproj
#
# If you'd rather not use XcodeGen, create a SwiftUI macOS App target in Xcode,
# add the libghostty-spm Swift Package, drop in the WorkroomApp/ sources, and add the
# Scripts/build-helper.sh as a post-build Run Script phase (see README.md).

name: WorkroomApp
options:
  bundleIdPrefix: com.developwithstyle
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    # Auto-update framework: polls the appcast feed and installs EdDSA-signed DMGs.
    # See WorkroomApp/Core/Updater.swift and the SU* Info.plist keys below.
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  libghostty:
    # Prebuilt GhosttyKit.xcframework (the libghostty C API as a static archive) distributed
    # as a Swift package. We link the `GhosttyKit` product (raw C API) and roll our own
    # terminal surface view — NOT the higher-level `GhosttyTerminal` wrapper. The embedding
    # API is not yet stable, so pin EXACT. Pre-GA we move
    # to a self-built xcframework from a Ghostty fork for full pin/patch control (see plan CMT-2).
    url: https://github.com/Lakr233/libghostty-spm
    exactVersion: 1.2.3

targets:
  WorkroomApp:
    type: application
    platform: macOS
    sources:
      - path: WorkroomApp
      # libghostty runtime resources (terminfo + shell-integration). Folder reference so the
      # tree (e.g. terminfo/78/xterm-ghostty) is copied verbatim into Contents/Resources/ghostty;
      # GhosttyApp points GHOSTTY_RESOURCES_DIR at it. See Resources/ghostty/SOURCE.md.
      - path: Resources/ghostty
        type: folder
        buildPhase: resources
    dependencies:
      - package: Sparkle
      # libghostty: link the raw C API product (GhosttyKit). Its package links c++ + Carbon;
      # the static Ghostty archive additionally needs these system frameworks at final link
      # (GPU renderer + CoreText font backend + HID).
      - package: libghostty
        product: GhosttyKit
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: CoreText.framework
      - sdk: IOKit.framework
      - sdk: QuartzCore.framework
    info:
      path: WorkroomApp/Info.plist
      properties:
        CFBundleDisplayName: Workroom
        CFBundleName: Workroom
        CFBundleIconName: AppIcon
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        LSApplicationCategoryType: public.app-category.developer-tools
        # Resolve from the build settings below so Scripts/release.sh can inject them from the
        # git tag. CFBundleVersion MUST increase every release — Sparkle compares it to decide
        # whether a newer build is available.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Sparkle auto-updater. SUPublicEDKey is the Ed25519 PUBLIC key from Sparkle's
        # `generate_keys` (run once); its private half signs the appcast in CI. The feed is an
        # asset on the fixed `appcast` GitHub release. See macapp/README.md ("Auto-update").
        SUFeedURL: "https://github.com/joelmoss/workroom/releases/download/appcast/appcast.xml"
        SUPublicEDKey: "JUdX5urBRS1a/heb5qKRuxdxQtHXS3WLGYd0+qI9P6k="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.developwithstyle.workroom
        PRODUCT_NAME: Workroom
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
        # Non-sandboxed (Developer ID): the app spawns git/jj and the bundled
        # workroom binary, and opens terminals in arbitrary project directories.
        ENABLE_APP_SANDBOX: NO
        SWIFT_VERSION: "5.0"
        DEAD_CODE_STRIPPING: YES
        DEVELOPMENT_TEAM: B898J443L9
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          # Local runs (⌘R): automatic signing with the Apple Development cert.
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          # Distribution: Developer ID Application + hardened runtime + secure timestamp.
          # The embedded helper is signed the same way by Scripts/build-helper.sh.
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
          # `xcodebuild build` (vs archive) injects com.apple.security.get-task-allow=1, a debug
          # entitlement notarization rejects ("The executable requests the get-task-allow
          # entitlement"). The app needs no entitlements, so suppress the base injection.
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    preBuildScripts:
      - name: swift-format lint
        # Surfaces swift-format violations as build warnings (non-fatal — won't block local
        # builds). `make app-lint` (repo root) runs `--strict` for a hard gate.
        basedOnDependencyAnalysis: false
        script: |
          if xcrun --find swift-format >/dev/null 2>&1; then
            xcrun swift-format lint --parallel --recursive \
              "${SRCROOT}/WorkroomApp" "${SRCROOT}/WorkroomAppTests" || true
          else
            echo "warning: swift-format not found in the active toolchain; skipping lint"
          fi
    postCompileScripts:
      - name: Build & embed workroom helper
        # Runs before Xcode's final code-sign so the embedded binary is covered by
        # the app signature. See Scripts/build-helper.sh.
        basedOnDependencyAnalysis: false
        script: '"${SRCROOT}/Scripts/build-helper.sh"'
    # Wire the unit tests into the app's scheme so `xcodebuild test -scheme WorkroomApp` runs
    # them. Debug builds enable testability, so `@testable import WorkroomApp` sees internals.
    scheme:
      testTargets:
        - WorkroomAppTests

  # Pure-logic unit tests (host-based so internal types are visible via @testable import).
  # XcodeGen wires TEST_HOST/BUNDLE_LOADER to WorkroomApp from the target dependency.
  WorkroomAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: WorkroomAppTests
    dependencies:
      - target: WorkroomApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.developwithstyle.workroom.tests
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: B898J443L9
        CODE_SIGN_STYLE: Automatic
        # The host app's PRODUCT_NAME is "Workroom" (not the target name "WorkroomApp"), so
        # XcodeGen's auto-derived TEST_HOST points at the wrong bundle. Set it to the real
        # product so the unit tests load into the app via @testable import.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Workroom.app/Contents/MacOS/Workroom"
        BUNDLE_LOADER: "$(TEST_HOST)"
