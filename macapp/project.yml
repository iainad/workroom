# XcodeGen spec for the Workroom macOS app.
#
# Generate the Xcode project from this file (the .xcodeproj is gitignored):
#     brew install xcodegen        # one-time
#     cd macapp && xcodegen generate && open WorkroomApp.xcodeproj
#
# If you'd rather not use XcodeGen, create a SwiftUI macOS App target in Xcode,
# add the libghostty-spm Swift Package, drop in the WorkroomApp/ sources, and add the
# Scripts/build-helper.sh as a post-build Run Script phase (see README.md).

name: WorkroomApp
options:
  bundleIdPrefix: com.developwithstyle
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    # Auto-update framework: polls the appcast feed and installs EdDSA-signed DMGs.
    # See WorkroomApp/Core/Updater.swift and the SU* Info.plist keys below.
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.3"
  libghostty:
    # Prebuilt GhosttyKit.xcframework (the libghostty C API as a static archive) distributed
    # as a Swift package. We link the `GhosttyKit` product (raw C API) and roll our own
    # terminal surface view — NOT the higher-level `GhosttyTerminal` wrapper. The embedding
    # API is not yet stable, so pin EXACT. Pre-GA we move
    # to a self-built xcframework from a Ghostty fork for full pin/patch control (see plan CMT-2).
    url: https://github.com/Lakr233/libghostty-spm
    exactVersion: 1.2.3
  Sentry:
    # Crash reporting, app-hang detection, tracing, profiling, and metrics. We link the `Sentry`
    # SPM product (the recommended static framework — it also re-exports the SwiftUI APIs since
    # 9.4.1). SDK init + the macOS-trimmed option set live in WorkroomApp.init() (SentrySDK.start).
    url: https://github.com/getsentry/sentry-cocoa
    from: "9.19.0"
  Defaults:
    # Type-safe UserDefaults: the single source of truth for every persisted preference's key +
    # default value. Keys live in WorkroomApp/Core/DefaultsKeys.swift; read via `@Default` in views
    # and `Defaults[...]` everywhere else. Pure Swift, no transitive deps.
    url: https://github.com/sindresorhus/Defaults
    from: "9.0.9"
  # --- Syntax highlighting (issue: tree-sitter diff highlighting, phase 1 editor foundation) ---
  # SwiftTreeSitter is the Swift wrapper over the tree-sitter C runtime: Language/Parser/Query +
  # the resource-bundle query loader (`LanguageConfiguration(_:name:)` finds each grammar's
  # `TreeSitter{name}_TreeSitter{name}` bundle and loads its `queries/highlights.scm`). Pinned
  # EXACT — the C ABI between the runtime and the pinned grammars must not drift under us.
  SwiftTreeSitter:
    url: https://github.com/ChimeHQ/SwiftTreeSitter
    exactVersion: "0.25.0"
  # The tree-sitter C runtime. Pulled transitively by SwiftTreeSitter, but declared explicitly so we
  # can `import TreeSitter` for the `TSInputEncodingUTF8` constant (SwiftTreeSitter exposes the
  # `TSInputEncoding` type in its API but does not re-export the C module's enum constants). Pinned
  # to the version SwiftTreeSitter 0.25.0 resolves, so there's no second copy of the runtime.
  TreeSitter:
    url: https://github.com/tree-sitter/tree-sitter
    exactVersion: "0.25.10"
  # Each grammar ships a `Package.swift` whose library target (`dependencies: []`) compiles only
  # `src/parser.c` (+ `src/scanner.c` for external-scanner grammars) and copies `queries/` as a
  # resource bundle. Their own (test-only) SwiftTreeSitter dependency is pruned by SPM, so we link
  # just the C product and supply SwiftTreeSitter ourselves. Pinned by EXACT COMMIT (the generated
  # parser's ABI is tied to the runtime above). TreeSitterBash carries an external scanner — the
  # lane-A packaging proof.
  TreeSitterJSON:
    url: https://github.com/tree-sitter/tree-sitter-json
    revision: 001c28d7a29832b06b0e831ec77845553c89b56d
  TreeSitterBash:
    url: https://github.com/tree-sitter/tree-sitter-bash
    revision: a06c2e4415e9bc0346c6b86d401879ffb44058f7
  # The Swift grammar's `src/parser.c` is generated and committed only on the `with-generated-files`
  # branch (the default branch omits it), so we pin a commit from that branch — not `main`.
  TreeSitterSwift:
    url: https://github.com/alex-pinkus/tree-sitter-swift
    revision: 31d17fe7e818a2048c808b5c6fdc2dc792f4f5b5
  TreeSitterGo:
    url: https://github.com/tree-sitter/tree-sitter-go
    revision: 2346a3ab1bb3857b48b29d779a1ef9799a248cd7
  TreeSitterRuby:
    url: https://github.com/tree-sitter/tree-sitter-ruby
    revision: ad907a69da0c8a4f7a943a7fe012712208da6dee
  # JS/Python/CSS/YAML are pinned to the newest tag whose Package.swift HARDCODES
  # `sources: ["src/parser.c", "src/scanner.c"]`. Their later tags switched to a
  # `FileManager.fileExists("src/scanner.c")` check that evaluates false under Xcode's SPM (wrong
  # CWD), silently dropping the external scanner and breaking the link.
  TreeSitterJavaScript:
    url: https://github.com/tree-sitter/tree-sitter-javascript
    revision: 3a837b6f3658ca3618f2022f8707e29739c91364
  # One package, one product (`TreeSitterTypeScript`) wrapping two targets/modules:
  # `TreeSitterTypeScript` + `TreeSitterTSX`. Both link from the single product dependency.
  TreeSitterTypeScript:
    url: https://github.com/tree-sitter/tree-sitter-typescript
    revision: 75b3874edb2dc714fb1fd77a32013d0f8699989f
  TreeSitterPython:
    url: https://github.com/tree-sitter/tree-sitter-python
    revision: bffb65a8cfe4e46290331dfef0dbf0ef3679de11
  TreeSitterYAML:
    url: https://github.com/tree-sitter-grammars/tree-sitter-yaml
    revision: b733d3f5f5005890f324333dd57e1f0badec5c87
  TreeSitterTOML:
    url: https://github.com/tree-sitter-grammars/tree-sitter-toml
    revision: 64b56832c2cffe41758f28e05c756a3a98d16f41
  # Split grammar (default branch `split_parser`): one product `TreeSitterMarkdown` over two
  # modules (block `TreeSitterMarkdown` + inline `TreeSitterMarkdownInline`). Phase 1 uses the block
  # grammar only (injections/inline are deferred), but linking the product pulls both.
  TreeSitterMarkdown:
    url: https://github.com/tree-sitter-grammars/tree-sitter-markdown
    revision: c3570720f7f7bbad22fe96603f106276618e0cf5
  TreeSitterHTML:
    url: https://github.com/tree-sitter/tree-sitter-html
    revision: 73a3947324f6efddf9e17c0ea58d454843590cc0
  TreeSitterCSS:
    url: https://github.com/tree-sitter/tree-sitter-css
    revision: c0d581e32d183a536731ed6c3a72758b27e20411
  # Product/module is `TreeSitterSql` (lowercase `ql`), not `TreeSitterSQL`. Pinned to the
  # `gh-pages` branch, which vendors the generated `src/parser.c` + `src/tree_sitter/parser.h` that
  # `main` strips — without them the external scanner can't find `tree_sitter/parser.h` and won't
  # compile.
  TreeSitterSql:
    url: https://github.com/DerekStride/tree-sitter-sql
    revision: 851e9cb257ba7c66cc8c14214a31c44d2f1e954e

targets:
  WorkroomApp:
    type: application
    platform: macOS
    sources:
      - path: WorkroomApp
      # libghostty runtime resources (terminfo + shell-integration). Folder reference so the
      # tree (e.g. terminfo/78/xterm-ghostty) is copied verbatim into Contents/Resources/ghostty;
      # GhosttyApp points GHOSTTY_RESOURCES_DIR at it. See Resources/ghostty/SOURCE.md.
      - path: Resources/ghostty
        type: folder
        buildPhase: resources
      # Run-command supervisor (issue #7): the long-lived shell that owns each run command's process
      # tree inside its terminal. Folder reference → copied to Contents/Resources/run-supervisor;
      # AppStore.supervisorScriptPath resolves it from Bundle.main.
      - path: Resources/run-supervisor
        type: folder
        buildPhase: resources
      # Markdown preview web assets (marked + DOMPurify + mermaid + our template/CSS/glue). Folder
      # reference → copied verbatim to Contents/Resources/markdown; MarkdownWebView loads it offline
      # via Bundle.main.url(forResource: "markdown"). See Resources/markdown/template.html.
      - path: Resources/markdown
        type: folder
        buildPhase: resources
    dependencies:
      - package: Sparkle
      # libghostty: link the raw C API product (GhosttyKit). Its package links c++ + Carbon;
      # the static Ghostty archive additionally needs these system frameworks at final link
      # (GPU renderer + CoreText font backend + HID).
      - package: libghostty
        product: GhosttyKit
      - package: Sentry
        product: Sentry
      - package: Defaults
      # Syntax highlighting: the Swift wrapper + the bundled tree-sitter grammars (C parsers +
      # their query resource bundles). See the `packages:` block above.
      - package: SwiftTreeSitter
        product: SwiftTreeSitter
      - package: TreeSitter
        product: TreeSitter
      - package: TreeSitterJSON
        product: TreeSitterJSON
      - package: TreeSitterBash
        product: TreeSitterBash
      - package: TreeSitterSwift
        product: TreeSitterSwift
      - package: TreeSitterGo
        product: TreeSitterGo
      - package: TreeSitterRuby
        product: TreeSitterRuby
      - package: TreeSitterJavaScript
        product: TreeSitterJavaScript
      - package: TreeSitterTypeScript
        product: TreeSitterTypeScript
      - package: TreeSitterPython
        product: TreeSitterPython
      - package: TreeSitterYAML
        product: TreeSitterYAML
      - package: TreeSitterTOML
        product: TreeSitterTOML
      - package: TreeSitterMarkdown
        product: TreeSitterMarkdown
      - package: TreeSitterHTML
        product: TreeSitterHTML
      - package: TreeSitterCSS
        product: TreeSitterCSS
      - package: TreeSitterSql
        product: TreeSitterSql
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: CoreText.framework
      - sdk: IOKit.framework
      - sdk: QuartzCore.framework
    info:
      path: WorkroomApp/Info.plist
      properties:
        # Track PRODUCT_NAME so the Debug build shows as "Workroom Dev" everywhere (Dock, ⌘-Tab,
        # the bold app menu) while Release stays "Workroom". CFBundleIconName tracks the asset
        # name so Debug picks up the amber AppIcon-Dev set and Release the teal AppIcon set.
        CFBundleDisplayName: "$(PRODUCT_NAME)"
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundleIconName: "$(ASSETCATALOG_COMPILER_APPICON_NAME)"
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        LSApplicationCategoryType: public.app-category.developer-tools
        # Resolve from the build settings below so Scripts/release.sh can inject them from the
        # git tag. CFBundleVersion MUST increase every release — Sparkle compares it to decide
        # whether a newer build is available.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Sparkle auto-updater. SUPublicEDKey is the Ed25519 PUBLIC key from Sparkle's
        # `generate_keys` (run once); its private half signs the appcast in CI. The feed is an
        # asset on the fixed `appcast` GitHub release. See macapp/README.md ("Auto-update").
        SUFeedURL: "https://github.com/joelmoss/workroom/releases/download/appcast/appcast.xml"
        SUPublicEDKey: "JUdX5urBRS1a/heb5qKRuxdxQtHXS3WLGYd0+qI9P6k="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        # Release identity (Debug overrides bundle id + name below to run side by side). The Swift
        # module is pinned to "Workroom" regardless of PRODUCT_NAME, so `@testable import Workroom`,
        # the Logger subsystems, and TEST_HOST keep working when the Debug product is "Workroom Dev".
        PRODUCT_BUNDLE_IDENTIFIER: com.developwithstyle.workroom
        PRODUCT_NAME: Workroom
        PRODUCT_MODULE_NAME: Workroom
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
        # Non-sandboxed (Developer ID): the app spawns git/jj and the bundled
        # workroom binary, and opens terminals in arbitrary project directories.
        ENABLE_APP_SANDBOX: NO
        SWIFT_VERSION: "5.0"
        DEAD_CODE_STRIPPING: YES
        DEVELOPMENT_TEAM: B898J443L9
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          # Distinct identity so a local Debug build runs alongside the installed release build
          # instead of fighting it for activation, the key window, preferences, and the global
          # ⌘§ hotkey (issue: "isolated builds"). A different bundle id makes LaunchServices treat
          # them as separate apps and gives the Debug build its own UserDefaults domain for free;
          # the "Workroom Dev" name + amber AppIcon-Dev make it obvious which window is which.
          PRODUCT_BUNDLE_IDENTIFIER: com.developwithstyle.workroom.dev
          PRODUCT_NAME: "Workroom Dev"
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon-Dev
          # Local runs (⌘R): automatic signing with the Apple Development cert.
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          # Distribution: Developer ID Application + hardened runtime + secure timestamp.
          # The embedded helper is signed the same way by Scripts/build-helper.sh.
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
          # `xcodebuild build` (vs archive) injects com.apple.security.get-task-allow=1, a debug
          # entitlement notarization rejects ("The executable requests the get-task-allow
          # entitlement"). The app needs no entitlements, so suppress the base injection.
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    preBuildScripts:
      - name: swift-format lint
        # Surfaces swift-format violations as build warnings (non-fatal — won't block local
        # builds). `make app-lint` (repo root) runs `--strict` for a hard gate.
        basedOnDependencyAnalysis: false
        script: |
          if xcrun --find swift-format >/dev/null 2>&1; then
            xcrun swift-format lint --parallel --recursive \
              "${SRCROOT}/WorkroomApp" "${SRCROOT}/WorkroomAppTests" || true
          else
            echo "warning: swift-format not found in the active toolchain; skipping lint"
          fi
    postCompileScripts:
      - name: Build & embed workroom helper
        # Runs before Xcode's final code-sign so the embedded binary is covered by
        # the app signature. See Scripts/build-helper.sh.
        basedOnDependencyAnalysis: false
        script: '"${SRCROOT}/Scripts/build-helper.sh"'
    # Wire the unit tests into the app's scheme so `xcodebuild test -scheme WorkroomApp` runs
    # them. Debug builds enable testability, so `@testable import WorkroomApp` sees internals.
    scheme:
      testTargets:
        - WorkroomAppTests

  # Pure-logic unit tests (host-based so internal types are visible via @testable import).
  # XcodeGen wires TEST_HOST/BUNDLE_LOADER to WorkroomApp from the target dependency.
  WorkroomAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: WorkroomAppTests
    dependencies:
      - target: WorkroomApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.developwithstyle.workroom.tests
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: B898J443L9
        CODE_SIGN_STYLE: Automatic
        # XcodeGen derives TEST_HOST from the target name (WorkroomApp), but the Debug product is
        # "Workroom Dev" (the side-by-side identity above), so point at that bundle explicitly.
        # Tests only ever run in Debug (the WorkroomApp scheme's test action + `make app-test`), so
        # the Debug name is correct here; the module stays "Workroom" so @testable import is fine.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Workroom Dev.app/Contents/MacOS/Workroom Dev"
        BUNDLE_LOADER: "$(TEST_HOST)"

  # macOS UI tests (XCUITest). Deliberately kept OUT of the WorkroomApp scheme's test action (see
  # `schemes:` below) so `make app-test` stays unit-only and headless — UI tests need a GUI session
  # and run via `make app-uitest`. XCUITest drives through the accessibility tree; the terminal
  # surface is Metal-rendered (its content isn't in the a11y tree until CMT-3), so these cover
  # app-shell workflows (sidebar, tabs, menus, badges), not terminal content.
  WorkroomAppUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: WorkroomAppUITests
    dependencies:
      - target: WorkroomApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.developwithstyle.workroom.uitests
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: B898J443L9
        CODE_SIGN_STYLE: Automatic
        TEST_TARGET_NAME: WorkroomApp

# Explicit schemes so the unit-test gate (`make app-test` → WorkroomApp scheme) runs ONLY the unit
# tests, while the UI tests run from their own scheme (`make app-uitest`). Without this, XcodeGen
# would fold the UI test target into the app scheme's test action and `make app-test` would try to
# launch a GUI session.
schemes:
  WorkroomApp:
    build:
      targets:
        WorkroomApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WorkroomAppTests
  WorkroomAppUITests:
    build:
      targets:
        WorkroomApp: all
        WorkroomAppUITests: [test]
    test:
      config: Debug
      targets:
        - WorkroomAppUITests
