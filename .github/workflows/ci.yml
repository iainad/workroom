name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # golangci-lint subsumes `go vet` (govet) and the gofmt check (gofmt linter). Installed
      # with `go install` so it's built with the project's Go toolchain (go.mod), matching local.
      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          "$(go env GOPATH)/bin/golangci-lint" run

      - name: Build
        run: go build -o workroom .

      - name: Test
        run: go test ./...

  app:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      # Xcode 16+ bundles swift-format (used by `make app-lint`) and builds for macOS 14+.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Scripts/build-helper.sh compiles + embeds the workroom CLI during the test build.
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # jj (Jujutsu) is required by WorkroomStatusIntegrationTests, which exercise the VCS
      # status resolver against real git + jj repos. git + gh are preinstalled on the runner;
      # jj is not. XcodeGen generates the (gitignored) .xcodeproj.
      - name: Install XcodeGen + jj
        run: brew install xcodegen jj

      - name: Lint (swift-format --strict)
        run: make app-lint

      # Hosted runners have no signing cert / dev team: ad-hoc sign, clear the team, manual
      # style so xcodebuild won't provision against Apple's servers. Lets the non-sandboxed
      # app build and the unit tests launch their host app. (`make app-test` also builds.)
      - name: Test
        run: >-
          make app-test
          APP_SIGN_FLAGS="CODE_SIGN_IDENTITY=- CODE_SIGN_STYLE=Manual CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=YES DEVELOPMENT_TEAM="
