name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # golangci-lint subsumes `go vet` (govet) and the gofmt check (gofmt linter). Installed
      # with `go install` so it's built with the project's Go toolchain (go.mod), matching local.
      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          "$(go env GOPATH)/bin/golangci-lint" run

      - name: Build
        run: go build -o workroom .

      - name: Test
        run: go test ./...
