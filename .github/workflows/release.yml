name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build a Developer ID-signed, notarized, stapled Workroom.dmg and attach it to the release
  # goreleaser created above. Requires repo secrets: MACOS_CERTIFICATE / MACOS_CERTIFICATE_PWD
  # (base64 .p12 + password), KEYCHAIN_PASSWORD, and the App Store Connect notary API key
  # NOTARY_KEY / NOTARY_KEY_ID / NOTARY_ISSUER_ID.
  # Optional: SENTRY_AUTH_TOKEN / SENTRY_ORG / SENTRY_PROJECT enable Sentry dSYM upload so release
  # crashes symbolicate; release.sh skips that step when any of them (or sentry-cli) is absent.
  macapp:
    needs: release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Scripts/build-helper.sh compiles + embeds the workroom CLI into the app bundle.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install XcodeGen + create-dmg + sentry-cli
        # sentry-cli uploads dSYMs in release.sh (skipped there if the Sentry env vars are unset).
        run: brew install xcodegen create-dmg getsentry/tools/sentry-cli

      - name: Import Developer ID signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT="$RUNNER_TEMP/dev-id.p12"
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$MACOS_CERTIFICATE" | openssl base64 -d -A > "$CERT"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT" -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain

      - name: Build, sign, notarize, staple, package DMG
        env:
          NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          # Sparkle: injects the tag as the app version and EdDSA-signs the DMG for the appcast.
          # Empty until the secret is added — release.sh then skips signing (DMG still ships).
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ github.ref_name }}
          # Sentry dSYM upload (optional — release.sh skips when any is empty). ORG/PROJECT are
          # slugs, not secrets, but kept as secrets here to match this job's convention.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          echo "$NOTARY_KEY" | openssl base64 -d -A > "$RUNNER_TEMP/notary.p8"
          NOTARY_KEY_PATH="$RUNNER_TEMP/notary.p8" make app-release

      - name: Upload installer to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Name matches the CLI archives' scheme; ${GITHUB_REF_NAME#v} drops the tag's leading
          # v so it lines up with goreleaser's {{ .Version }} (e.g. workroom-macos-app_1.4.0.dmg).
          ASSET="$RUNNER_TEMP/workroom-macos-app_${GITHUB_REF_NAME#v}.dmg"
          cp macapp/build/release/Workroom.dmg "$ASSET"
          gh release upload "$GITHUB_REF_NAME" "$ASSET" --clobber

      - name: Publish Sparkle appcast
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: macapp/Scripts/appcast.sh
