name: Refresh appcast notes

# When a release's notes are curated/edited after publish, re-render the matching Sparkle appcast
# item's <description> so the in-app update dialog shows the curated notes — not the raw commit list
# the build-time appcast (release.yml → appcast.sh) captured before the notes were written.
#
# Asset uploads don't emit a `release` event, and events from GITHUB_TOKEN don't re-trigger
# workflows, so re-uploading appcast.xml here can't loop back into this workflow.
on:
  release:
    types: [edited]

permissions:
  contents: write

jobs:
  refresh:
    # Skip edits to the appcast feed release itself (it mirrors no notes).
    if: github.event.release.tag_name != 'appcast'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Refresh appcast description from release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: macapp/Scripts/appcast-notes.sh
